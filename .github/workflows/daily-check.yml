name: Daily Version Check & Auto-Release

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch latest Factory version
        id: version
        run: |
          LATEST=$(curl -sfL https://api.factory.ai/api/desktop/latest-version | python3 -c "import sys,json; print(json.load(sys.stdin)['latestVersion'])")
          echo "LATEST=$LATEST"
          echo "LATEST=$LATEST" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$LATEST" >/dev/null 2>&1; then
            echo "Already released v$LATEST — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$LATEST detected!"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.skip != 'true'
        with:
          node-version: '20'

      - name: Install build dependencies
        if: steps.version.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full dpkg-dev fakeroot rpm zstd libarchive-tools alien xvfb libnotify4 libsecret-1-0
          npm install @electron/asar

      - name: Download Factory DMG
        if: steps.version.outputs.skip != 'true'
        run: |
          curl -sfL -o Factory-arm64.dmg \
            "https://app.factory.ai/api/desktop?platform=darwin&architecture=arm64" \
            -w "\nHTTP %{http_code} | %{size_download} bytes"

      - name: Extract and patch
        if: steps.version.outputs.skip != 'true'
        id: patch
        run: |
          make extract
          make patch 2>&1 | tee /tmp/patch-output.txt
          python3 scripts/check-patches.py 2>&1 | tee /tmp/check-output.txt

          if grep -q 'WARNING.*not found' /tmp/patch-output.txt; then
            echo "patches_failed=true" >> "$GITHUB_OUTPUT"
            grep 'WARNING.*not found' /tmp/patch-output.txt > /tmp/failed-patches.txt
          else
            echo "patches_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-fix patches with Qwen
        if: steps.patch.outputs.patches_failed == 'true'
        env:
          QWEN_API_KEY: ${{ secrets.NANBUILDERS_API_KEY }}
        run: |
          echo "Patches failed — attempting auto-repair with Qwen..."
          cat /tmp/failed-patches.txt

          BUNDLE_FILE=$(ls app-unpacked/.vite/build/index-*.js | head -1)
          echo "Bundle: $BUNDLE_FILE"

          python3 scripts/auto-fix-patches.py \
            --bundle "$BUNDLE_FILE" \
            --api-key "$QWEN_API_KEY"

          rm -rf app-unpacked
          make extract
          make patch
          python3 scripts/check-patches.py

          if ! python3 scripts/check-patches.py; then
            echo "Auto-fix failed — manual intervention required"
            exit 1
          fi

          echo "Patches auto-repaired successfully"

      - name: Repack asar and download Electron
        if: steps.version.outputs.skip != 'true'
        run: |
          make asar
          make electron

      - name: Package .deb
        if: steps.version.outputs.skip != 'true'
        run: |
          bash scripts/build-deb.sh ${{ steps.version.outputs.LATEST }}

      - name: Smoke test (headless launch)
        if: steps.version.outputs.skip != 'true'
        run: |
          echo "Installing DEB..."
          sudo dpkg -i dist/factory-desktop_${{ steps.version.outputs.LATEST }}_amd64.deb || true
          sudo apt-get install -f -y

          echo "Launching headless smoke test..."
          # CI containers lack user namespaces and GPU — use workarounds
          FACTORY_DISABLE_GPU=1 FACTORY_NO_SANDBOX=1 \
            timeout 30 xvfb-run --auto-servernum factory-desktop 2>&1 | tee /tmp/smoke-test.log || true

          echo "--- Smoke test output ---"
          cat /tmp/smoke-test.log

          if grep -q 'Renderer finished loading' /tmp/smoke-test.log && \
             grep -q 'daemon_ipc_ready' /tmp/smoke-test.log; then
            echo "SMOKE TEST PASSED: Renderer loaded, daemon connected."
          else
            echo "SMOKE TEST FAILED: Missing expected log output."
            exit 1
          fi

          echo "Cleaning up..."
          sudo dpkg -r factory-desktop || true

      - name: Package .rpm
        if: steps.version.outputs.skip != 'true'
        run: |
          sudo alien -r dist/*.deb --scripts
          mv *.rpm dist/ 2>/dev/null || true

      - name: Package .pkg.tar.zst (experimental)
        if: steps.version.outputs.skip != 'true'
        continue-on-error: true
        run: |
          bash scripts/build-pacman.sh ${{ steps.version.outputs.LATEST }} || \
            echo "::warning::Arch packaging failed"

      - name: Update version and create PR
        if: steps.version.outputs.skip != 'true'
        run: |
          V="${{ steps.version.outputs.LATEST }}"
          BRANCH="auto-release-v$V"
          echo "$V" > .current-version

          git config user.name "factory-droid[bot]"
          git config user.email "138933559+factory-droid[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet || git commit -m "Release v$V (auto)"

          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release v$V (auto)" \
            --body "Automated release for Factory Desktop v$V. Patches verified, smoke test passed." \
            --label "autorelease"

          # Auto-merge if smoke test passed
          gh pr merge "$BRANCH" --auto --squash --delete-branch || \
            echo "::warning::Auto-merge not available (may require branch protection rule adjustment)"

          # Tag after merge
          sleep 10
          git checkout main
          git pull origin main
          git tag -a "v$V" -m "Auto-release v$V"
          git push origin "v$V"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.LATEST }}
          name: v${{ steps.version.outputs.LATEST }}
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
          generate_release_notes: true
