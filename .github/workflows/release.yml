name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full dpkg-dev fakeroot rpm zstd libarchive-tools
          npm install @electron/asar

      - name: Fetch latest version
        id: version
        run: |
          LATEST=$(curl -sfL https://api.factory.ai/api/desktop/latest-version | python3 -c "import sys,json; print(json.load(sys.stdin)['latestVersion'])")
          echo "LATEST=$LATEST"
          echo "LATEST=$LATEST" >> "$GITHUB_OUTPUT"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "LATEST=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Factory DMG
        run: |
          curl -sfL -o Factory-arm64.dmg \
            "https://app.factory.ai/api/desktop?platform=darwin&architecture=arm64" \
            -w "\nHTTP %{http_code} | %{size_download} bytes"

      - name: Extract and patch
        run: |
          make extract
          make patch
          python3 scripts/check-patches.py
          make asar

      - name: Download Electron and assemble
        run: |
          make electron
          make assemble

      - name: Package .deb
        run: |
          bash scripts/build-deb.sh ${{ steps.version.outputs.LATEST }}
          echo "DEB_NAME=$(ls dist/*.deb)" >> "$GITHUB_OUTPUT"

      - name: Package .rpm
        run: |
          sudo apt-get install -y -qq alien
          sudo alien -r dist/*.deb --scripts
          mv *.rpm dist/ 2>/dev/null || true
          ls dist/*.rpm

      - name: Package .pkg.tar.zst (experimental)
        continue-on-error: true
        run: |
          bash scripts/build-pacman.sh ${{ steps.version.outputs.LATEST }} || \
            echo "::warning::Arch packaging failed — build script needs manual setup"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: factory-desktop-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: factory-desktop-rpm
          path: dist/*.rpm
          if-no-files-found: error

      - name: Upload .pkg.tar.zst artifact
        uses: actions/upload-artifact@v4
        with:
          name: factory-desktop-pacman
          path: dist/*.pkg.tar.zst
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: factory-desktop-*
          merge-multiple: true
          path: dist/

      - name: List artifacts
        run: find dist -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.pkg.tar.zst
